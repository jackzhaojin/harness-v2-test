<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    /* ========================================
       CSS Custom Properties (Design Tokens)
       ======================================== */
    :root {
      /* Colors */
      --color-primary: #3b82f6;
      --color-primary-hover: #2563eb;
      --color-primary-focus: #1d4ed8;
      --color-danger: #ef4444;
      --color-danger-hover: #dc2626;
      --color-success: #22c55e;
      --color-text: #1f2937;
      --color-text-muted: #6b7280;
      --color-text-light: #9ca3af;
      --color-bg: #f9fafb;
      --color-surface: #ffffff;
      --color-border: #e5e7eb;
      --color-border-focus: #3b82f6;
      --color-shadow: rgba(0, 0, 0, 0.1);
      
      /* Spacing */
      --space-xs: 0.25rem;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
      
      /* Typography */
      --font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-size-sm: 0.875rem;
      --font-size-base: 1rem;
      --font-size-lg: 1.125rem;
      --font-size-xl: 1.5rem;
      --font-weight-normal: 400;
      --font-weight-medium: 500;
      --font-weight-bold: 700;
      
      /* Layout */
      --container-max-width: 600px;
      --border-radius: 0.5rem;
      --border-radius-sm: 0.25rem;
      
      /* Transitions */
      --transition-fast: 150ms ease;
      --transition-base: 200ms ease;
    }

    /* ========================================
       Reset & Base Styles
       ======================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      line-height: 1.5;
      color: var(--color-text);
      background-color: var(--color-bg);
      min-height: 100vh;
      padding: var(--space-lg) var(--space-md);
    }

    /* ========================================
       Layout Components
       ======================================== */
    .container {
      max-width: var(--container-max-width);
      margin: 0 auto;
    }

    /* ========================================
       Header
       ======================================== */
    header {
      text-align: center;
      margin-bottom: var(--space-xl);
    }

    h1 {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-text);
      margin-bottom: var(--space-sm);
    }

    /* ========================================
       Main Content
       ======================================== */
    main {
      background-color: var(--color-surface);
      border-radius: var(--border-radius);
      box-shadow: 0 1px 3px var(--color-shadow);
      padding: var(--space-lg);
    }

    /* ========================================
       Todo Form
       ======================================== */
    #todo-form {
      display: flex;
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
    }

    #todo-input {
      flex: 1;
      padding: var(--space-sm) var(--space-md);
      font-size: var(--font-size-base);
      font-family: inherit;
      color: var(--color-text);
      background-color: var(--color-surface);
      border: 2px solid var(--color-border);
      border-radius: var(--border-radius);
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }

    #todo-input::placeholder {
      color: var(--color-text-light);
    }

    #todo-input:focus {
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    #todo-form button[type="submit"] {
      padding: var(--space-sm) var(--space-lg);
      font-size: var(--font-size-base);
      font-family: inherit;
      font-weight: var(--font-weight-medium);
      color: white;
      background-color: var(--color-primary);
      border: none;
      border-radius: var(--border-radius);
      cursor: pointer;
      transition: background-color var(--transition-fast), transform var(--transition-fast);
    }

    #todo-form button[type="submit"]:hover {
      background-color: var(--color-primary-hover);
    }

    #todo-form button[type="submit"]:active {
      transform: translateY(1px);
    }

    #todo-form button[type="submit"]:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.4);
    }

    /* ========================================
       Todo List Container
       ======================================== */
    #todo-list {
      list-style: none;
      min-height: 100px;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: var(--space-2xl) var(--space-lg);
      color: var(--color-text-muted);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: var(--space-md);
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-medium);
    }

    .empty-state-hint {
      font-size: var(--font-size-sm);
      margin-top: var(--space-xs);
      color: var(--color-text-light);
    }

    /* ========================================
       Todo Items (for future tasks)
       ======================================== */
    .todo-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md);
      border-bottom: 1px solid var(--color-border);
      transition: background-color var(--transition-fast);
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-item:hover {
      background-color: var(--color-bg);
    }

    .todo-item input[type="checkbox"] {
      width: 1.25rem;
      height: 1.25rem;
      cursor: pointer;
      accent-color: var(--color-primary);
      flex-shrink: 0;
    }

    .todo-item input[type="checkbox"]:focus-visible {
      outline: 2px solid var(--color-border-focus);
      outline-offset: 2px;
    }

    .todo-item span {
      flex: 1;
      font-size: var(--font-size-base);
      color: var(--color-text);
      word-break: break-word;
    }

    .todo-item.completed span {
      text-decoration: line-through;
      color: var(--color-text-muted);
    }

    .todo-item button.delete {
      padding: var(--space-xs) var(--space-sm);
      font-size: var(--font-size-lg);
      line-height: 1;
      color: var(--color-danger);
      background: transparent;
      border: none;
      border-radius: var(--border-radius-sm);
      cursor: pointer;
      opacity: 0.6;
      transition: opacity var(--transition-fast), background-color var(--transition-fast);
    }

    .todo-item button.delete:hover {
      opacity: 1;
      background-color: rgba(239, 68, 68, 0.1);
    }

    .todo-item button.delete:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--color-danger);
      opacity: 1;
    }

    /* ========================================
       Focus Indicators (Keyboard Navigation)
       ======================================== */
    :focus-visible {
      outline: 2px solid var(--color-border-focus);
      outline-offset: 2px;
    }

    /* ========================================
       Mobile-First Responsive Design
       ======================================== */
    
    /* Tablet and up */
    @media (min-width: 640px) {
      body {
        padding: var(--space-2xl) var(--space-lg);
      }

      h1 {
        font-size: 2rem;
      }

      main {
        padding: var(--space-xl);
      }

      #todo-form button[type="submit"] {
        padding: var(--space-sm) var(--space-xl);
      }
    }

    /* Desktop */
    @media (min-width: 1024px) {
      :root {
        --container-max-width: 700px;
      }

      h1 {
        font-size: 2.25rem;
      }
    }

    /* ========================================
       Reduced Motion (Accessibility)
       ======================================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Todo List</h1>
    </header>
    
    <main>
      <form id="todo-form" role="form" aria-label="Add new todo">
        <input 
          type="text" 
          id="todo-input" 
          placeholder="What needs to be done?"
          aria-label="New todo text"
          autocomplete="off"
          required
        >
        <button type="submit" aria-label="Add todo">Add</button>
      </form>
      
      <ul id="todo-list" role="list" aria-label="Todo items">
        <!-- Empty state will be shown when no todos exist -->
        <li class="empty-state" aria-live="polite">
          <div class="empty-state-icon" aria-hidden="true">📝</div>
          <p class="empty-state-text">No todos yet</p>
          <p class="empty-state-hint">Add a todo above to get started</p>
        </li>
      </ul>
    </main>
  </div>

  <script>
    (function() {
      'use strict';

      // ========================================
      // State
      // ========================================
      let todos = [];
      let nextId = 1;

      // ========================================
      // DOM Element References
      // ========================================
      const todoForm = document.getElementById('todo-form');
      const todoInput = document.getElementById('todo-input');
      const todoList = document.getElementById('todo-list');

      // ========================================
      // Utility Functions
      // ========================================
      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // ========================================
      // Core Functions
      // ========================================
      function addTodo(text) {
        const trimmedText = text.trim();
        if (!trimmedText) return;

        todos.unshift({
          id: nextId++,
          text: trimmedText,
          completed: false
        });

        render();
      }

      function toggleTodo(id) {
        const todo = todos.find(t => t.id === id);
        if (todo) {
          todo.completed = !todo.completed;
          render();
        }
      }

      function deleteTodo(id) {
        todos = todos.filter(t => t.id !== id);
        render();
      }

      // ========================================
      // Render Function
      // ========================================
      function render() {
        if (todos.length === 0) {
          // Show empty state
          todoList.innerHTML = `
            <li class="empty-state" aria-live="polite">
              <div class="empty-state-icon" aria-hidden="true">📝</div>
              <p class="empty-state-text">No todos yet</p>
              <p class="empty-state-hint">Add a todo above to get started</p>
            </li>
          `;
          return;
        }

        // Render todo items
        todoList.innerHTML = todos.map(todo => `
          <li class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
            <input 
              type="checkbox" 
              ${todo.completed ? 'checked' : ''} 
              aria-label="Mark "${escapeHtml(todo.text)}" as ${todo.completed ? 'incomplete' : 'complete'}"
            >
            <span>${escapeHtml(todo.text)}</span>
            <button class="delete" aria-label="Delete "${escapeHtml(todo.text)}"">×</button>
          </li>
        `).join('');
      }

      // ========================================
      // Event Listeners
      // ========================================
      todoForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = todoInput.value;
        addTodo(text);
        todoInput.value = '';
        todoInput.focus();
      });

      // Event delegation for todo list interactions
      todoList.addEventListener('click', (e) => {
        const item = e.target.closest('.todo-item');
        if (!item) return;

        const id = Number(item.dataset.id);

        if (e.target.matches('input[type="checkbox"]')) {
          toggleTodo(id);
        } else if (e.target.matches('.delete')) {
          deleteTodo(id);
        }
      });

      // ========================================
      // Initialization
      // ========================================
      // Focus input on page load
      todoInput.focus();

    })();
  </script>
</body>
</html>
