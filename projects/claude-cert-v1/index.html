    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Developer Certification - Study Environment</title>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var ghPath = params.get('gh_path');
        if (!ghPath) {
          return;
        }

        var appEntryPath = window.location.pathname.endsWith('/')
          ? window.location.pathname
          : window.location.pathname + '/';
        var restoredUrl = new URL(ghPath, window.location.origin + appEntryPath);
        window.history.replaceState(null, '', restoredUrl.pathname + restoredUrl.search + restoredUrl.hash);
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
