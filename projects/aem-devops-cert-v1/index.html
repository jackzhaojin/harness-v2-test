    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var ghPath = params.get('gh_path');
        if (!ghPath) {
          return;
        }

        var appEntryPath = window.location.pathname.endsWith('/')
          ? window.location.pathname
          : window.location.pathname + '/';
        var restoredUrl = new URL(ghPath, window.location.origin + appEntryPath);
        window.history.replaceState(null, '', restoredUrl.pathname + restoredUrl.search + restoredUrl.hash);
      })();
    </script>
